name: Build Binary

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to build"
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install gettext
        run: sudo apt-get update && sudo apt-get install -y gettext

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build binary
        run: cargo build --release

      - name: Compile translations
        run: |
          mkdir -p locale/en/LC_MESSAGES locale/es/LC_MESSAGES
          msgfmt po/en.po -o locale/en/LC_MESSAGES/riskie.mo
          msgfmt po/es.po -o locale/es/LC_MESSAGES/riskie.mo

      - name: Create release tarball
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          mkdir -p riskie-${VERSION}/systemd
          cp target/release/riskie riskie-${VERSION}/
          cp -r locale riskie-${VERSION}/
          cp contrib/systemd/riskie.service riskie-${VERSION}/systemd/
          cp LICENSE riskie-${VERSION}/
          tar -czvf riskie-${VERSION}-linux-x86_64.tar.gz riskie-${VERSION}

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: riskie-linux-x86_64
          path: riskie-*-linux-x86_64.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download tarball artifact
        uses: actions/download-artifact@v4
        with:
          name: riskie-linux-x86_64
          path: ./release

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.tar.gz
          generate_release_notes: true